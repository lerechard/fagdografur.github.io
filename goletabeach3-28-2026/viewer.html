<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>03-28-2026</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; }
    header { display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    h1 { margin:0; font-size: 22px; }
    #status { color:#555; font-size: 14px; }
    .grid { margin-top: 16px; display:grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
    .card { border: 1px solid #e6e6e6; border-radius: 14px; overflow:hidden; background:#fff; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
    .thumb { width:100%; height: 160px; object-fit: cover; display:block; background:#fafafa; }
    .meta { padding: 10px; display:flex; flex-direction:column; gap:8px; }
    .name { font-size: 13px; color:#222; word-break: break-word; }
    .actions { display:flex; gap:8px; }
    .actions a { flex:1; text-align:center; padding: 8px 10px; border-radius: 10px; text-decoration:none; border:1px solid #ddd; color:#111; }
    .actions a:hover { background:#f6f6f6; }
  </style>
</head>
<body>
  <header>
    <h1 id="title">02-28-2026</h1>
    <div id="status">Loading…</div>
  </header>

  <div id="grid" class="grid"></div>

  <script>
    const grid = document.getElementById("grid");
    const statusEl = document.getElementById("status");
    const titleEl = document.getElementById("title");

    // Because this index.html is INSIDE the folder, these are relative to it:
    const MANIFEST_URL = "./manifest.json";

    function isProbablyImage(name) {
      return /\.(jpe?g|png|gif|webp|bmp|svg|avif|heic)$/i.test(name);
    }

    function addCard(filename) {
      const card = document.createElement("div");
      card.className = "card";

      const img = document.createElement("img");
      img.className = "thumb";
      img.loading = "lazy";
      img.alt = filename;
      img.src = "./" + encodeURIComponent(filename).replaceAll("%2F", "/"); // safe-ish
      // NOTE: if your filenames include spaces, encodeURIComponent is important.

      const meta = document.createElement("div");
      meta.className = "meta";

      const nameEl = document.createElement("div");
      nameEl.className = "name";
      nameEl.textContent = filename;

      const actions = document.createElement("div");
      actions.className = "actions";

      const open = document.createElement("a");
      open.href = img.src;
      open.target = "_blank";
      open.rel = "noopener";
      open.textContent = "Open";

      const dl = document.createElement("a");
      dl.href = img.src;
      dl.download = filename;
      dl.textContent = "Download";

      actions.appendChild(open);
      actions.appendChild(dl);

      meta.appendChild(nameEl);
      meta.appendChild(actions);

      card.appendChild(img);
      card.appendChild(meta);

      grid.appendChild(card);
    }

    async function main() {
      try {
        const res = await fetch(MANIFEST_URL, { cache: "no-store" });
        if (!res.ok) throw new Error(`Failed to load manifest.json (HTTP ${res.status})`);

        const manifest = await res.json();
        const title = manifest.title || "Gallery";
        const images = Array.isArray(manifest.images) ? manifest.images : [];

        titleEl.textContent = title;

        const filtered = images.filter(isProbablyImage);

        statusEl.textContent = filtered.length
          ? `Found ${filtered.length} image(s).`
          : `No images listed in manifest.json.`;

        filtered.forEach(addCard);
      } catch (err) {
        console.error(err);
        statusEl.textContent = "Error loading manifest.json. Check file path + GitHub Pages build.";
      }
    }

    main();
  </script>
</body>
</html>
